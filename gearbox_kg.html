<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gearbox Disassembly Connection Graph</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e8e8e8;
    }
    header {
      padding: 1rem 1.5rem;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    h1 { font-size: 1.25rem; font-weight: 600; }
    .subtitle { font-size: 0.85rem; color: #94a3b8; margin-top: 0.25rem; }
    #graph { width: 100%; height: calc(100vh - 120px); min-height: 500px; }
    .legend {
      display: flex;
      gap: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: rgba(0,0,0,0.2);
      font-size: 0.8rem;
      flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 0.5rem; }
    .legend-dot {
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
    }
    .legend-dot.fastener { background: #f59e0b; }
    .legend-dot.component { background: #3b82f6; }
    .legend-dot.base { background: #22c55e; }
    .legend-dot.independent { background: #a78bfa; }
    .legend-dot.first { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
  </style>
</head>
<body>
  <header>
    <h1>Gearbox Disassembly Connection Graph</h1>
    <p class="subtitle">DPM-based dependency graph — edge A→B: A must be removed before B</p>
  </header>
  <div class="legend">
    <span class="legend-item"><span class="legend-dot first"></span> F1 (First to remove)</span>
    <span class="legend-item"><span class="legend-dot fastener"></span> Fasteners (F2–F7)</span>
    <span class="legend-item"><span class="legend-dot base"></span> Base (C1, last)</span>
    <span class="legend-item"><span class="legend-dot independent"></span> Independent (F3, C11–14, C16)</span>
    <span class="legend-item"><span class="legend-dot component"></span> Components</span>
  </div>
  <div id="graph"></div>

  <script>
    const partNames = {
      F1: 'Screw M12×30 ISO 4016',
      F2: 'Positioning Pin ISO 2338',
      F3SX: 'Flange screws (left)',
      F3DX: 'Flange screws (right)',
      F4: 'Shaft 3 key',
      F5: 'Shaft 4 key RH',
      F6: 'Shaft 4 key',
      F7: 'Shaft 5 key',
      C1: 'Base',
      C2SX: 'Bearings 12 (left)',
      C2DX: 'Bearings 12 (right)',
      C3SX: 'Bearings 14 (left)',
      C3DX: 'Bearings 14 (right)',
      C4: 'Shaft 5',
      C5: 'Shaft 4',
      C6: 'Shaft 3',
      C7: 'Shaft Sprocket 3',
      C8: 'Shaft Sprocket 4 RH',
      C9: 'Shaft Sprocket 4',
      C10: 'Shaft Sprocket 5',
      C11SX: 'Flange 4 (left)',
      C11DX: 'Flange 4 (right)',
      C12: 'Flange 5',
      C13: 'Bearing flange (no hole)',
      C14: 'Bearing flange (with hole)',
      C15: 'Cover',
      C16: 'Hook',
      C17: 'Spacer'
    };

    const independent = ['F1','F3SX','F3DX','C11SX','C11DX','C12','C13','C14','C16'];
    const disassemblyStep = {
      F1:1,F3SX:2,F3DX:3,C11SX:4,C11DX:5,C12:6,C13:7,C14:8,C2SX:9,C16:10,F2:11,C15:12,F7:13,C2DX:14,C3SX:15,C3DX:16,C7:17,C6:18,C8:19,F6:20,C9:21,F5:22,C5:23,C17:24,C10:25,F4:26,C4:27,C1:28
    };

    const nodes = new vis.DataSet(
      Object.keys(partNames).map((id, i) => {
        let color, shape = 'ellipse';
        if (id === 'F1') { color = { background: '#ef4444', border: '#f87171' }; shape = 'star'; }
        else if (id === 'C1') { color = { background: '#22c55e', border: '#4ade80' }; shape = 'box'; }
        else if (id.startsWith('F')) { color = { background: '#f59e0b', border: '#fbbf24' }; }
        else if (independent.includes(id)) { color = { background: '#a78bfa', border: '#c4b5fd' }; }
        else { color = { background: '#3b82f6', border: '#60a5fa' }; }
        return {
          id,
          label: id,
          title: `${id}: ${partNames[id]}\nRemoval step: ${disassemblyStep[id] || '?'}`,
          color,
          shape,
          font: { size: id === 'F1' || id === 'C1' ? 20 : 14 }
        };
      })
    );

    const edges = new vis.DataSet([
      ['F1','F2'],['F3SX','F2'],['F3DX','F2'],['C16','F2'],
      ['F1','F4'],['F3SX','F4'],['F3DX','F4'],['C3SX','F4'],['C10','F4'],['C11SX','F4'],['C11DX','F4'],['C12','F4'],['C13','F4'],['C14','F4'],['C15','F4'],['C17','F4'],
      ['F1','F5'],['F3DX','F5'],['C2SX','F5'],['C9','F5'],['C11SX','F5'],['C11DX','F5'],['C12','F5'],['C13','F5'],['C14','F5'],['C15','F5'],
      ['F1','F6'],['F3SX','F6'],['F3DX','F6'],['C2DX','F6'],['C8','F6'],['C11SX','F6'],['C11DX','F6'],['C12','F6'],['C13','F6'],['C14','F6'],['C15','F6'],
      ['F1','F7'],['F3SX','F7'],['F3DX','F7'],['C2SX','F7'],['C11SX','F7'],['C11DX','F7'],['C12','F7'],['C13','F7'],['C14','F7'],['C15','F7'],
      ['F1','C1'],['F2','C1'],['F3SX','C1'],['F3DX','C1'],['C2SX','C1'],['C2DX','C1'],['C3SX','C1'],['C3DX','C1'],['C4','C1'],['C5','C1'],['C6','C1'],['C7','C1'],['C8','C1'],['C9','C1'],['C10','C1'],['C11SX','C1'],['C11DX','C1'],['C12','C1'],['C13','C1'],['C14','C1'],['C15','C1'],['C16','C1'],
      ['F1','C2SX'],['F3SX','C2SX'],['F3DX','C2SX'],['C11SX','C2SX'],['C11DX','C2SX'],['C12','C2SX'],['C13','C2SX'],['C14','C2SX'],
      ['F1','C2DX'],['F3SX','C2DX'],['F3DX','C2DX'],['C11SX','C2DX'],['C11DX','C2DX'],['C12','C2DX'],['C13','C2DX'],['C14','C2DX'],['C15','C2DX'],
      ['F1','C3SX'],['F3SX','C3SX'],['F3DX','C3SX'],['C11SX','C3SX'],['C11DX','C3SX'],['C12','C3SX'],['C13','C3SX'],['C14','C3SX'],['C15','C3SX'],
      ['F1','C3DX'],['F3SX','C3DX'],['F3DX','C3DX'],['C11SX','C3DX'],['C11DX','C3DX'],['C12','C3DX'],['C13','C3DX'],['C14','C3DX'],['C15','C3DX'],
      ['F1','C4'],['F3SX','C4'],['F3DX','C4'],['F4','C4'],['C3SX','C4'],['C3DX','C4'],['C10','C4'],['C11SX','C4'],['C11DX','C4'],['C12','C4'],['C13','C4'],['C14','C4'],['C15','C4'],
      ['F1','C5'],['F3SX','C5'],['F3DX','C5'],['F5','C5'],['F6','C5'],['C2SX','C5'],['C2DX','C5'],['C8','C5'],['C9','C5'],['C11SX','C5'],['C11DX','C5'],['C12','C5'],['C13','C5'],['C14','C5'],['C15','C5'],
      ['F1','C6'],['F3SX','C6'],['F3DX','C6'],['F7','C6'],['C2SX','C6'],['C2DX','C6'],['C7','C6'],['C11SX','C6'],['C11DX','C6'],['C12','C6'],['C13','C6'],['C14','C6'],['C15','C6'],
      ['F1','C7'],['F3SX','C7'],['F3DX','C7'],['C2SX','C7'],['C11SX','C7'],['C11DX','C7'],['C12','C7'],['C13','C7'],['C14','C7'],['C15','C7'],
      ['F1','C8'],['F3SX','C8'],['F3DX','C8'],['C2DX','C8'],['C11SX','C8'],['C11DX','C8'],['C12','C8'],['C13','C8'],['C14','C8'],['C15','C8'],
      ['F1','C9'],['F3SX','C9'],['F3DX','C9'],['C2SX','C9'],['C11SX','C9'],['C11DX','C9'],['C12','C9'],['C13','C9'],['C14','C9'],['C15','C9'],
      ['F1','C10'],['F3SX','C10'],['F3DX','C10'],['C3SX','C10'],['C11SX','C10'],['C11DX','C10'],['C12','C10'],['C13','C10'],['C14','C10'],['C15','C10'],['C17','C10'],
      ['F3SX','C11SX'],['F3DX','C11DX'],['F3SX','C12'],['F3DX','C13'],['F3SX','C14'],
      ['F1','C15'],['F3SX','C15'],['F3DX','C15'],['C11SX','C15'],['C11DX','C15'],['C12','C15'],['C13','C15'],['C14','C15'],['C16','C15'],
      ['F1','C17'],['F3SX','C17'],['F3DX','C17'],['C3SX','C17'],['C11SX','C17'],['C11DX','C17'],['C12','C17'],['C13','C17'],['C14','C17'],['C15','C17']
    ].map(([from, to], i) => ({ id: i, from, to, arrows: 'to' })));

    const container = document.getElementById('graph');
    const data = { nodes, edges };
    const options = {
      nodes: {
        borderWidth: 2,
        shadow: true,
        font: { color: '#fff', strokeWidth: 0 }
      },
      edges: {
        color: { color: 'rgba(148,163,184,0.5)' },
        width: 0.8,
        smooth: { type: 'continuous' }
      },
      physics: {
        enabled: true,
        forceAtlas2Based: {
          gravitationalConstant: -80,
          centralGravity: 0.01,
          springLength: 80,
          springConstant: 0.08,
          avoidOverlap: 0.5
        },
        solver: 'forceAtlas2Based',
        stabilization: {
          iterations: 500,
          updateInterval: 25,
          fit: true
        }
      },
      interaction: {
        hover: true,
        tooltipDelay: 100,
        zoomView: true,
        dragView: true
      }
    };

    const network = new vis.Network(container, data, options);
    network.fit({ animation: { duration: 500 } });
  </script>
</body>
</html>
